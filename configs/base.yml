# Main config template (TUI S3)
#
# This repo's runtime expects the "new schema":
# - dataset: uses `dataset.name` (python import path) + constructor kwargs
# - pipeline: optional; either `albumentations` or registry/torchvision.v2
# - dataloader: split-specific mapping (`train/val/test`)
#
# For legacy/mmseg-style configs, see: `configs/base_mmseg_legacy.yml`

model:
  name: unet
  num_classes: 2
  bilinear: true

dataset:
  name: data.datasets.TUI_s3.TUIS3
  bucket: ${oc.env:TUI_BUCKET,tui}
  # train/val share one prefix; test uses a separate prefix and has no split file.
  prefix:
    train: ${oc.env:TUI_PREFIX,TUI_train}
    val: ${oc.env:TUI_PREFIX,TUI_train}
    test: ${oc.env:TUI_TEST_PREFIX,TUI_test}
  img_dir: ${oc.env:TUI_IMG_DIR,imgs}
  label_path: ${oc.env:TUI_LABEL_PATH,Description.json}
  region: ${oc.env:TUI_REGION,us-east-1}
  endpoint: ${oc.env:TUI_ENDPOINT,null}
  force_path_style: ${oc.env:TUI_FORCE_PATH_STYLE,true}
  split_file:
    train: ${oc.env:TUI_TRAIN_SPLIT,filter/train_filter.txt}
    val: ${oc.env:TUI_VAL_SPLIT,filter/test_filter.txt}
    test: null

  # Credentials: DO NOT hardcode in YAML. Export env vars instead:
  #   export AWS_ACCESS_KEY_ID=...
  #   export AWS_SECRET_ACCESS_KEY=...
  # Optional: you can also set AWS_SESSION_TOKEN.

dataloader:
  train:
    batch_size: 8
    num_workers: 4
    shuffle: true
    drop_last: true
    pin_memory: false
  val:
    batch_size: 4
    num_workers: 4
    shuffle: false
    drop_last: false
    pin_memory: false
  test:
    batch_size: 4
    num_workers: 4
    shuffle: false
    drop_last: false
    pin_memory: false

pipeline:
  train:
    - type: LoadRawBytes
    - type: DecodeImage
    - type: BuildMaskFromSegments
    - type: ApplyAlbumentations
      transforms:
        - type: SmallestMaxSize
          max_size: 256
        - type: PadIfNeeded
          min_height: 256
          min_width: 256
        - type: HorizontalFlip
          p: 0.5
        - type: VerticalFlip
          p: 0.5
        - type: Normalize
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
        - type: ToTensorV2
    - type: FinalizeSegSample
  val:
    - type: LoadRawBytes
    - type: DecodeImage
    - type: BuildMaskFromSegments
    - type: ApplyAlbumentations
      transforms:
        - type: SmallestMaxSize
          max_size: 256
        - type: PadIfNeeded
          min_height: 256
          min_width: 256
        - type: Normalize
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
        - type: ToTensorV2
    - type: FinalizeSegSample
  test:
    - type: LoadRawBytes
    - type: DecodeImage
    - type: BuildMaskFromSegments
    - type: ApplyAlbumentations
      transforms:
        - type: SmallestMaxSize
          max_size: 256
        - type: PadIfNeeded
          min_height: 256
          min_width: 256
        - type: Normalize
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
        - type: ToTensorV2
    - type: FinalizeSegSample

optimizer:
  type: adamw
  lr: 1e-4
  weight_decay: 0.01

lr_scheduler:
  type: PolyLR
  max_epochs: 5
  power: 0.9

loss:
  type: CrossEntropyLoss
  ignore_index: -100

metrics:
  - mIoU
  - Dice
  - Accuracy

trainer:
  max_epochs: 5
  log_interval: 50
  eval_interval: 1

records:
  enabled: false
  splits: ["val", "test"]
  interval_epochs: 1
  num_samples: 16
  out_dir: "records/raw"
  save_pred_mask: true
  save_gt_mask: true
  threshold: 0.5

# MLflow is optional. If you keep it, `main.py` treats it as enabled.
# Comment out to run fully offline.
mlflow:
  enabled: true
  tracking_uri: ${oc.env:MLFLOW_TRACKING_URI,http://172.16.240.33:5000}
  experiment_name: ${oc.env:MLFLOW_EXPERIMENT,tui_unet}
  run_name: null
  tags:
    dataset: tui
    model: unet
  log_system_metrics: false
  artifact_subdir: artifacts
  register_model: false
  log_model_format: state_dict
  best_metric: val_loss
  best_mode: min
