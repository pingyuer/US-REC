# Demo configuration for quick testing

model:
  name: unet
  num_classes: 2
  input_channels: 3
  bilinear: true

dataset:
  name: data.datasets.dataset.BaseDataset
  data_list: []  # Will use a dummy empty list

dataloader:
  train:
    batch_size: 2
    num_workers: 0
    shuffle: true
    drop_last: false
    pin_memory: false
  val:
    batch_size: 2
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false

optimizer:
  type: adamw
  lr: 1e-4
  weight_decay: 0.01

lr_scheduler:
  type: PolyLR
  max_epochs: 2
  power: 0.9

loss:
  type: CrossEntropyLoss
  ignore_index: -100

trainer:
  max_epochs: 2
  log_interval: 10
  eval_interval: 1
  save_interval: 5

# MLflow is optional - comment out to disable
# mlflow:
#   experiment_name: demo
#   tracking_uri: http://localhost:5000
