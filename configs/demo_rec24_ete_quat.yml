# Demo config for tus-rec-24 S3 freehand reconstruction (ETE) — quaternion rotation.

# ---------------------------------------------------------------------------
# Reproducibility
# ---------------------------------------------------------------------------
seed: 0

# ---------------------------------------------------------------------------
# Paths (all filesystem writes reference these — no hardcoded relative paths)
# ---------------------------------------------------------------------------
paths:
  output_dir: logs
  log_dir: null
  ckpt_dir: null
  cache_dir: null

model:
  name: efficientnet_b1
  pred_type: parameter
  label_type: transform
  in_ch_reg: 1
  ddf_dirc: Move
  conv_coords: optimised_coord
  img_pro_coord: pro_coord
  batch_norm: BNoff
  use_voxelmorph: false
  use_deform: false
  use_backward: false
  enable_voxel: false
  interpolation:
    method: bilinear
    volume: fixed_interval
  # Pose head rotation parameterization:
  #   "se3_expmap" — 6-dim Euler (ZYX) [default, legacy]
  #   "quat"       — 7-dim quaternion [w,x,y,z] + translation
  #   "rot6d"      — 9-dim 6D continuous (Zhou 2019) + translation
  pose_head:
    rotation_rep: quat

dataset:
  name: data.datasets.TUS_rec_s3.TUSRecS3Iterable
  backend: s3
  bucket: ${oc.env:TUS_REC24_BUCKET,tus-rec-24}
  region: ${oc.env:TUS_REC24_REGION,us-east-1}
  endpoint: ${oc.env:TUS_REC24_ENDPOINT,http://172.16.240.77:9000}
  force_path_style: true
  prefix:
    train: train
    val: val
    test: val
  frame_dir: frames
  tform_dir:
    train: null
    val: transfs
    test: transfs
  landmark_dir: landmark
  return_landmarks: false
  max_keys: 2000
  calib_file: ${oc.env:TUS_REC24_CALIB,s3://tus-rec-24/train/calib_matrix.csv}
  resample_factor: 4
  sampling:
    pair_mode: adjacent
    random_pairs_per_slice: null
    # Per-split settings: shuffle/buffer only in training; eval is deterministic.
    shuffle_slices:
      train: true
      val: false
      test: false
    shuffle_pairs:
      train: true
      val: false
      test: false
    shuffle_buffer_size:
      train: 4096
      val: 0
      test: 0
    buffer_emit_prob:
      train: 1.0
      val: 1.0
      test: 1.0
    # Direction-flip augmentation: swap (A,B) → (B,A) with p=0.5 during training.
    # Helps the model generalise motion estimation to both scan directions.
    augment_direction_flip:
      train: true
      val: false
      test: false
    prefetch_slices: 4
    seed: 0
    num_samples: 100
    sample_range: 100

dataloader:
  train:
    batch_size: 12
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false
  val:
    batch_size: 1
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false
  test:
    batch_size: 1
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false

optimizer:
  type: adam
  lr_rec: 1e-4
  lr_reg: 1e-4

lr_scheduler:
  type: null

loss:
  type: MSE_points
  reg_weight: 1000
  alpha_def: 0.0
  alpha_voxel: 0.0
  # Rotation-aware loss (used only when rotation_rep != se3_expmap
  # or when you want explicit geometric rotation supervision):
  #   rot_loss: "geodesic" | "quat_inner"
  #   trans_loss: "l1" | "l2"
  #   rot_weight / trans_weight: scalar balancing terms
  rot_loss: quat_inner
  trans_loss: l2
  rot_weight: 1.0
  trans_weight: 1.0

trainer:
  name: trainers.rec_trainer.Train_Rec_Reg_Model
  max_epochs: 
  log_interval: 500
  validate_every: 1
  save_interval: 100
  info_interval: 1
  retain_epoch: "00000000"
  mode:
    inter: nointer
    meta: nonmeta
  rec_trainer:
    non_improve_maxmum: 1e10
    reg_loss_weight: 1000
    val_loss_min: 1e10
    val_dist_min: 1e10
    val_loss_min_reg: 1e10
    option: common_volume

# ---------------------------------------------------------------------------
# Sampling limits (set via CLI --max-scans / --max-frames for smoke tests)
# ---------------------------------------------------------------------------
data:
  max_scans: null
  max_frames_per_scan: null

train:
  max_steps: null

eval:
  max_scans: null

logging:
  mlflow:
    enabled: true
    tracking_uri: ${oc.env:MLFLOW_TRACKING_URI,"http://172.16.240.33:5000"}
    experiment_name: ${oc.env:MLFLOW_EXPERIMENT_NAME,"rec"}
    run_name: ${oc.env:MLFLOW_RUN_NAME,"${now:%Y%m%d_%H%M%S}_${model.name}"}
    tags:
      dataset: tus_rec24
      model: efficientnet_b1
    log_system_metrics: false
    artifact_subdir: artifacts
    register_model: false
    log_model_format: state_dict
    best_metric: final_score
    best_mode: max

runtime:
  gpu_ids: "0"
  multi_gpu: false

# ---------------------------------------------------------------------------
# Checkpoint loading (MLflow-first, local fallback)
# ---------------------------------------------------------------------------
checkpoint:
  # --- MLflow source ---
  # Pin a specific MLflow run ID to load from.  null = auto-search best run.
  mlflow_run_id: null
  # Artifact sub-path inside the run (MLflowHook saves here).
  mlflow_artifact: "checkpoints/best"
  # When mlflow_run_id is null, search the experiment for the best finished run.
  mlflow_search_best: true

  # --- Local fallback (used when MLflow is unreachable or disabled) ---
  # Explicit .pt file path; null = auto-scan <run_dir>/checkpoints/best_*.pt
  local_path: null

  # --- Behaviour ---
  load_on_eval: true      # load before --eval-only
  load_on_resume: true    # load when retain_epoch > 0 (training resume)
  strict: true            # strict=True for load_state_dict

# ---------------------------------------------------------------------------
# Visualisation (VizHook)
# ---------------------------------------------------------------------------
viz:
  enabled: true
  drift_curve: true    # GPE/LPE per-frame drift curve (pred vs gt)
  pose_curve: true     # translation norm & rotation angle vs frame
  recon_slices: false  # axial/sagittal/coronal slices (only if volume available)
  save_png: true
  save_csv: true
  out_dir: null        # null → <run_dir>/viz/
