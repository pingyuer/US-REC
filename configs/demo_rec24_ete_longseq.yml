# Long-sequence (Early-CNN + Temporal Transformer) config for TUS-REC-24.
#
# Two-stage architecture:
#   1. Per-frame EfficientNet encoder  → frame tokens
#   2. Causal sliding-window Transformer → context tokens
#   3. LocalPoseHead (Δ=1) + MultiIntervalHead (Δ∈{2,4,8,16})
#
# Multi-interval auxiliary supervision + consistency constraint to
# reduce global drift (GPE).
#
# Run modes (from project root):
#   Train:      python main_rec.py --config configs/demo_rec24_ete_longseq.yml
#   Smoke eval: python -m trainers.longseq_trainer  (see bottom of that file)
#   Test:       pytest tests/test_longseq_smoke.py -v

# ---------------------------------------------------------------------------
# Reproducibility
# ---------------------------------------------------------------------------
seed: 0

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  output_dir: logs
  log_dir: null
  ckpt_dir: null
  cache_dir: null

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model:
  # Switch between baseline pairwise ("efficientnet_b1") and new longseq model.
  type: longseq_transformer  # "longseq_transformer" | "baseline"
  name: efficientnet_b1      # kept for baseline fallback
  pred_type: parameter
  label_type: transform
  in_ch_reg: 1
  ddf_dirc: Move
  conv_coords: optimised_coord
  img_pro_coord: pro_coord
  batch_norm: BNoff
  use_voxelmorph: false
  use_deform: false
  use_backward: false
  enable_voxel: false
  interpolation:
    method: bilinear
    volume: fixed_interval
  pose_head:
    rotation_rep: rot6d   # "rot6d" recommended for transformer head

  # Early-CNN encoder parameters
  encoder:
    backbone: efficientnet_b1     # b1 has more capacity, matches paper
    pretrained: true              # use ImageNet init; 1-ch avg handled in FrameEncoder

  # Temporal Transformer parameters
  transformer:
    d_model: 256
    n_heads: 4
    n_layers: 4
    dim_feedforward: 1024
    window_size: 64
    dropout: 0.1
    # Transformer-XL memory tokens: carry context across segment boundaries.
    # 0 = disabled (same as original).  Set to 32 or 64 for cross-segment context.
    memory_size: 0

  # Image dimensions for DDF pixel sampling (H x W)
  image_size_h: 480
  image_size_w: 640

# ---------------------------------------------------------------------------
# Dataset (S3-backed)
# ---------------------------------------------------------------------------
dataset:
  name: data.datasets.TUS_rec_s3.TUSRecS3Iterable
  backend: s3
  bucket: ${oc.env:TUS_REC24_BUCKET,tus-rec-24}
  region: ${oc.env:TUS_REC24_REGION,us-east-1}
  endpoint: ${oc.env:TUS_REC24_ENDPOINT,http://172.16.240.77:9000}
  force_path_style: true
  prefix:
    train: train
    val: val
    test: val
  frame_dir: frames
  tform_dir:
    train: null
    val: transfs
    test: transfs
  landmark_dir: landmark
  return_landmarks: false
  max_keys: 2000
  calib_file: ${oc.env:TUS_REC24_CALIB,s3://tus-rec-24/train/calib_matrix.csv}
  resample_factor: 4
  sampling:
    pair_mode: adjacent
    random_pairs_per_slice: null
    shuffle_slices:
      train: true
      val: false
      test: false
    shuffle_pairs:
      train: true
      val: false
      test: false
    shuffle_buffer_size:
      train: 4096
      val: 0
      test: 0
    buffer_emit_prob:
      train: 1.0
      val: 1.0
      test: 1.0
    augment_direction_flip:
      train: true
      val: false
      test: false
    prefetch_slices: 4
    seed: 0
    num_samples: 100
    sample_range: 100

  # Scan-window mode (for longseq trainer)
  sequence_mode: scan_window
  sequence_window: 128
  windows_per_scan: 4           # was 1; more windows → better coverage per epoch

  # Time-reversal augmentation for scan-window training
  # augment.reverse_prob is the preferred key; legacy augment_flip/flip_prob
  # are kept as fallbacks for backward compatibility.
  augment_flip: true            # kept for backward compat
  flip_prob: 0.5
  augment:
    reverse_prob: 0.5           # preferred key; overrides flip_prob when set

dataloader:
  train:
    batch_size: 1          # sequence mode: 1 scan-window per batch
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false
  val:
    batch_size: 1
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false
  test:
    batch_size: 1
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
optimizer:
  type: adam
  lr_rec: 1e-4
  lr_reg: 1e-4

lr_scheduler:
  type: null

# ---------------------------------------------------------------------------
# Loss
# ---------------------------------------------------------------------------
loss:
  type: MSE_points           # baseline path (used by pairwise trainer)
  reg_weight: 1000
  alpha_def: 0.0
  alpha_voxel: 0.0
  rot_loss: geodesic
  trans_loss: l2
  rot_weight: 1.0
  trans_weight: 1.0

  # Long-sequence multi-interval auxiliary supervision
  aux_intervals: [2, 4, 8, 16]
  aux_weight: 0.5            # base weight for auxiliary losses
  aux_decay: 0.5             # multiplicative decay per interval rank
  aux_scale: none            # "none" (recommended for points mode) | "delta" | "delta2"

  # Points-based loss mode: rotation error is encoded in point displacement,
  # so no separate rot/trans weighting is needed.
  mode: points               # "points" (default) | "se3" (ablation)
  ref_pts_scale_mm: 20.0     # half-span of reference square in mm

  # DDF surrogate loss: sample random pixels, map through calib, apply global T.
  # Matches the TUS-REC evaluation oracle.  Requires dataset.calib_file.
  # Set ddf_sample_weight: 0.0 to disable (no calib needed).
  ddf_sample_weight: 0.0     # e.g. 0.1 once calib is confirmed correct
  ddf_num_points: 1024       # random pixels per batch

  # Consistency constraint
  consistency_weight: 0.1
  consistency_delta: 2

# ---------------------------------------------------------------------------
# Trainer
# ---------------------------------------------------------------------------
trainer:
  name: trainers.longseq_trainer.LongSeqTrainer
  max_epochs: 3
  log_interval: 50
  validate_every: 1
  save_interval: 100
  info_interval: 1
  retain_epoch: "00000000"
  grad_accum: 4              # effective batch = batch_size × grad_accum = 4
  mode:
    inter: nointer
    meta: nonmeta
  rec_trainer:
    non_improve_maxmum: 1e10
    reg_loss_weight: 1000
    val_loss_min: 1e10
    val_dist_min: 1e10
    val_loss_min_reg: 1e10
    option: common_volume

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
train:
  max_steps: null
  sequence_window: 128

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
data:
  max_scans: null
  max_frames_per_scan: null

eval:
  max_scans: null
  # Metric mode for evaluate():
  #   "points"     — fast ref-point L2 proxy, no calib needed
  #   "tusrec_ddf" — official TUS-REC DDF (GPE_mm/LPE_mm/final_score)
  #                  requires dataset.calib_file to be set
  metric_mode: tusrec_ddf

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  mlflow:
    enabled: true
    tracking_uri: ${oc.env:MLFLOW_TRACKING_URI,"http://172.16.240.33:5000"}
    experiment_name: ${oc.env:MLFLOW_EXPERIMENT_NAME,"rec"}
    run_name: ${oc.env:MLFLOW_RUN_NAME,"${now:%Y%m%d_%H%M%S}_longseq"}
    tags:
      dataset: tus_rec24
      model: longseq_transformer
    log_system_metrics: false
    artifact_subdir: artifacts
    register_model: false
    log_model_format: state_dict
    best_metric: val_tusrec_final_score
    best_mode: max

runtime:
  gpu_ids: "0"
  multi_gpu: false

# ---------------------------------------------------------------------------
# Checkpoint
# ---------------------------------------------------------------------------
checkpoint:
  mlflow_run_id: null
  mlflow_artifact: "checkpoints/best"
  mlflow_search_best: true
  local_path: null
  load_on_eval: true
  load_on_resume: true
  strict: true

# ---------------------------------------------------------------------------
# Visualisation
# ---------------------------------------------------------------------------
viz:
  enabled: true
  drift_curve: true
  pose_curve: true
  recon_slices: false
  save_png: true
  save_csv: true
  out_dir: null
