# TUS-REC 2024 S3 configuration (env-driven).

model:
  name: unet
  num_classes: 2
  bilinear: true

dataset:
  name: data.datasets.TUI_s3.TUIS3
  bucket: ${oc.env:TUS_REC24_BUCKET,tus-rec-24}
  prefix:
    train: ${oc.env:TUS_REC24_PREFIX_TRAIN,train}
    val: ${oc.env:TUS_REC24_PREFIX_VAL,val}
    test: ${oc.env:TUS_REC24_PREFIX_TEST,train}
  img_dir: ${oc.env:TUS_REC24_IMG_DIR,frames}
  label_path: ${oc.env:TUS_REC24_LABEL_PATH,Description.json}
  region: ${oc.env:TUS_REC24_REGION,us-east-1}
  endpoint: ${oc.env:TUS_REC24_ENDPOINT,http://172.16.240.77:9000}
  force_path_style: true
  split_file:
    train: ${oc.env:TUS_REC24_TRAIN_SPLIT,null}
    val: ${oc.env:TUS_REC24_VAL_SPLIT,null}
    test: null

dataloader:
  train:
    batch_size: 8
    num_workers: 4
    shuffle: true
    drop_last: true
    pin_memory: false
  val:
    batch_size: 4
    num_workers: 4
    shuffle: false
    drop_last: false
    pin_memory: false

pipeline:
  train:
    - type: LoadRawBytes
    - type: DecodeImage
    - type: BuildMaskFromSegments
    - type: ApplyAlbumentations
      transforms:
        - type: SmallestMaxSize
          max_size: 256
        - type: PadIfNeeded
          min_height: 256
          min_width: 256
        - type: HorizontalFlip
          p: 0.5
        - type: VerticalFlip
          p: 0.5
        - type: Normalize
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
        - type: ToTensorV2
    - type: FinalizeSegSample
  val:
    - type: LoadRawBytes
    - type: DecodeImage
    - type: BuildMaskFromSegments
    - type: ApplyAlbumentations
      transforms:
        - type: SmallestMaxSize
          max_size: 256
        - type: PadIfNeeded
          min_height: 256
          min_width: 256
        - type: Normalize
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
        - type: ToTensorV2
    - type: FinalizeSegSample
  test:
    - type: LoadRawBytes
    - type: DecodeImage
    - type: BuildMaskFromSegments
    - type: ApplyAlbumentations
      transforms:
        - type: SmallestMaxSize
          max_size: 256
        - type: PadIfNeeded
          min_height: 256
          min_width: 256
        - type: Normalize
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
        - type: ToTensorV2
    - type: FinalizeSegSample

optimizer:
  type: adamw
  lr: 1e-4
  weight_decay: 0.01

lr_scheduler:
  type: PolyLR
  max_epochs: 1
  power: 0.9

loss:
  type: DiceCELoss
  dice_weight: 1.0
  ce_weight: 1.0
  ignore_index: -100
  include_background: true

metrics: ["mIoU", "Dice", "Accuracy"]

trainer:
  max_epochs: 5
  log_interval: 50
  eval_interval: 1
  save_interval: 50
