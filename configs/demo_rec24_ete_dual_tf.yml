# Dual-path Transformer (Dense Δ=1 + Sparse Δ=k) config for TUS-REC-24.
#
# Architecture:
#   1. Shared per-frame EfficientNet-B1 encoder → frame tokens
#   2a. Dense Transformer (sliding-window causal) → DenseHead → T_{i-1←i}
#   2b. Sparse Transformer (large/full window)    → SparseHead → T_{(m-1)k←mk}
#
# Training: Dense loss + Sparse loss (no auxΔ, no consistency constraint).
# Eval: Anchor-correction fusion (or pose-graph) → fused global → TUS-REC metrics.
#
# Run modes:
#   Train:       python main_rec.py --config configs/demo_rec24_ete_dual_tf.yml
#   Smoke eval:  python main_rec.py --config configs/demo_rec24_ete_dual_tf.yml --eval-smoke
#   Dry run:     python main_rec.py --config configs/demo_rec24_ete_dual_tf.yml --dry-run

# ---------------------------------------------------------------------------
# Reproducibility
# ---------------------------------------------------------------------------
seed: 0

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  output_dir: logs
  log_dir: null
  ckpt_dir: null
  cache_dir: null

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model:
  type: dual_transformer
  k_stride: 8              # Sparse branch stride (Δ=k)

  pose_head:
    rotation_rep: rot6d     # 6D continuous rotation (Gram-Schmidt)

  # Shared Early-CNN encoder
  encoder:
    backbone: efficientnet_b1
    pretrained: true

  # Common transformer dimension (shared between branches)
  transformer:
    d_model: 256
    dropout: 0.1

  # Dense branch (Δ=1): sliding-window causal attention
  dense:
    transformer:
      n_heads: 4
      n_layers: 4
      dim_feedforward: 1024
      window_size: 64

  # Sparse branch (Δ=k): larger window / near-full attention on short subsequence
  sparse:
    transformer:
      n_heads: 4
      n_layers: 4
      dim_feedforward: 1024
      window_size: 256       # effectively full attention for T/k ≈ 16 anchors

  # Image dimensions for reference
  image_size_h: 480
  image_size_w: 640

# ---------------------------------------------------------------------------
# Fusion (eval-time)
# ---------------------------------------------------------------------------
fusion:
  mode: anchor_interp       # "anchor_interp" | "pose_graph"
  anchor_smooth: true        # SE(3) log-space interpolation between corrections
  # Pose-graph parameters (only used when mode=pose_graph)
  pose_graph:
    n_iters: 20
    huber_delta: 0.1
    sparse_info_weight: 2.0

# ---------------------------------------------------------------------------
# Dataset (S3-backed) — same as longseq config
# ---------------------------------------------------------------------------
dataset:
  name: data.datasets.TUS_rec_s3.TUSRecS3Iterable
  backend: s3
  bucket: ${oc.env:TUS_REC24_BUCKET,tus-rec-24}
  region: ${oc.env:TUS_REC24_REGION,us-east-1}
  endpoint: ${oc.env:TUS_REC24_ENDPOINT,http://172.16.240.77:9000}
  force_path_style: true
  prefix:
    train: train
    val: val
    test: val
  frame_dir: frames
  tform_dir:
    train: null
    val: transfs
    test: transfs
  landmark_dir: landmark
  return_landmarks: false
  max_keys: 2000
  calib_file: ${oc.env:TUS_REC24_CALIB,s3://tus-rec-24/train/calib_matrix.csv}
  resample_factor: 4
  sampling:
    pair_mode: adjacent
    random_pairs_per_slice: null
    shuffle_slices:
      train: true
      val: false
      test: false
    shuffle_pairs:
      train: true
      val: false
      test: false
    shuffle_buffer_size:
      train: 4096
      val: 0
      test: 0
    buffer_emit_prob:
      train: 1.0
      val: 1.0
      test: 1.0
    augment_direction_flip:
      train: true
      val: false
      test: false
    prefetch_slices: 4
    seed: 0
    num_samples: 100
    sample_range: 100

  # Scan-window mode
  sequence_mode: scan_window
  sequence_window: 128
  sampling_mode: tiled          # "tiled" (non-overlapping, no redundancy) or "random" (legacy)
  tile_overlap: 0               # overlap between consecutive tiles (0 = no overlap)
  min_tile_size: 64             # remainder tiles shorter than this merge into previous tile
  max_tiles_per_scan: 0         # 0 = unlimited; set e.g. 4 to cap cost on very long scans
  windows_per_scan: 4           # only used when sampling_mode=random

  # Time-reversal augmentation
  augment_flip: true
  flip_prob: 0.5
  augment:
    reverse_prob: 0.5

dataloader:
  train:
    batch_size: 1
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false
  val:
    batch_size: 1
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false
  test:
    batch_size: 1
    num_workers: 0
    shuffle: false
    drop_last: false
    pin_memory: false

# ---------------------------------------------------------------------------
# Optimizer — AdamW + warm-up + cosine schedule
# ---------------------------------------------------------------------------
optimizer:
  type: adamw
  lr_rec: 5e-4                # peak learning rate (after warm-up)
  weight_decay: 0.01          # decoupled weight decay (AdamW)
  betas: [0.9, 0.999]
  min_lr: 1e-6                # cosine schedule floor
  warmup_steps: 20            # ~5-10% of total steps; was 200 (too long)
  encoder_lr_mult: 0.1        # encoder LR = lr_rec × 0.1 (pretrained → lower LR)

lr_scheduler:
  type: null

# ---------------------------------------------------------------------------
# Loss — dual path, NO auxΔ, smooth losses
# ---------------------------------------------------------------------------
loss:
  # Rotation: chordal (Frobenius) distance — smooth everywhere, no acos
  # Translation: smooth L1 (Huber) — robust to outlier frames
  rot_loss: chordal
  trans_loss: smooth_l1
  rot_weight: 1.0
  trans_weight: 1.0
  dense_weight: 1.0
  sparse_weight: 1.0

  # Explicitly disabled — no multi-interval aux losses
  aux_intervals: []
  aux_weight: 0.0
  aux_decay: 0.0
  consistency_weight: 0.0

  mode: se3

# ---------------------------------------------------------------------------
# Trainer
# ---------------------------------------------------------------------------
trainer:
  name: trainers.dual_trainer.DualTrainer
  max_epochs: 3
  log_interval: 50
  grad_accum_steps: 4         # accumulate 4 tiles → effective batch ≈ 4 sequences
  max_grad_norm: 1.0          # gradient clipping max-norm
  ema_decay: 0.999            # exponential moving average (0 = disabled)
  validate_every: 1
  save_interval: 100
  info_interval: 1
  retain_epoch: "00000000"
  grad_accum: 4
  mode:
    inter: nointer
    meta: nonmeta
  rec_trainer:
    non_improve_maxmum: 1e10
    reg_loss_weight: 1000
    val_loss_min: 1e10
    val_dist_min: 1e10
    val_loss_min_reg: 1e10
    option: common_volume

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
train:
  max_steps: null
  sequence_window: 128

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
data:
  max_scans: null
  max_frames_per_scan: null

eval:
  max_scans: null
  metric_mode: tusrec_ddf

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  mlflow:
    enabled: true
    tracking_uri: ${oc.env:MLFLOW_TRACKING_URI,"http://172.16.240.33:5000"}
    experiment_name: ${oc.env:MLFLOW_EXPERIMENT_NAME,"rec"}
    run_name: ${oc.env:MLFLOW_RUN_NAME,"${now:%Y%m%d_%H%M%S}_dual_tf"}
    tags:
      dataset: tus_rec24
      model: dual_transformer
    log_system_metrics: false
    artifact_subdir: artifacts
    register_model: false
    log_model_format: state_dict
    best_metric: val_tusrec_final_score
    best_mode: max

runtime:
  gpu_ids: "0"
  multi_gpu: false

# ---------------------------------------------------------------------------
# Checkpoint
# ---------------------------------------------------------------------------
checkpoint:
  mlflow_run_id: null
  mlflow_artifact: "checkpoints/best"
  mlflow_search_best: true
  local_path: null
  load_on_eval: true
  load_on_resume: true
  strict: true
  # CheckpointHook settings
  save_interval: 0            # 0 = no periodic epoch checkpoints; set 1 to save every epoch
  best_metric: val_loss       # metric key for best-model tracking (mean_gpe_mm mapped to val_loss)
  best_mode: min              # "min" = lower is better (lower GPE = better)
  save_optimizer: true        # include optimizer + EMA in checkpoint for full resume

# ---------------------------------------------------------------------------
# Visualisation
# ---------------------------------------------------------------------------
viz:
  enabled: true
  drift_curve: true
  pose_curve: true
  recon_slices: false
  save_png: true
  save_csv: true
  out_dir: null
