experiment:
  name: "unext_baseline"
  seed: 42
  output_dir: "work_dirs/unext_baseline"

model:
  type: "UNeXt"
  backbone: "swin_tiny"
  decoder: "seg_head"
  in_channels: 3
  num_classes: 2
  pretrained: true
  init_weights: null  # 可指定 ckpt 路径

dataset:
  type: "CustomSegDataset"
  data_root: "data/seg_dataset"
  train_split: "train.txt"
  val_split: "val.txt"
  test_split: "test.txt"
  img_suffix: ".png"
  mask_suffix: ".png"

dataloader:
  batch_size: 8
  num_workers: 4
  pin_memory: true
  shuffle: true

transforms:
  train:
    - type: "LoadImage"
    - type: "LoadMask"
    - type: "RandomFlip"
    - type: "RandomCrop"
    - type: "ColorJitter"
    - type: "ToTensor"
    - type: "Normalize"
  val:
    - type: "LoadImage"
    - type: "LoadMask"
    - type: "ToTensor"
    - type: "Normalize"

loss:
  type: "DiceCELoss"
  dice_weight: 1.0
  ce_weight: 1.0
  ignore_index: 255

metrics:
  - "mIoU"
  - "Dice"
  - "Accuracy"

optimizer:
  type: "AdamW"
  lr: 0.0001
  weight_decay: 0.01

lr_scheduler:
  type: "PolyLR"
  max_epochs: 100
  power: 0.9
  warmup: 1000

trainer:
  max_epochs: 100
  log_interval: 50
  eval_interval: 1
  save_interval: 5
  resume_from: null
  amp: true  # 混合精度

# Records/materials (raw input images + optional masks) archived via MLflow artifacts.
records:
  enabled: false
  splits: ["val", "test"]
  interval_epochs: 1
  num_samples: 16
  out_dir: "records/raw"
  save_pred_mask: true
  save_gt_mask: true
  threshold: 0.5

mlflow:
  experiment_name: "unext_baseline"
  tracking_uri: "http://172.16.240.33:5000"
  run_tags:
    dataset: "busi"
    model: "hjunet_probnew13"
  logging:
    log_train_loss: true
    log_val_metrics: true
    log_learning_rate: true
    log_images: true
  artifacts:
    save_best_model: true
    save_last_checkpoint: true
    save_final_config: true

checkpoint:
  save_best: "mIoU"
  save_last: true
