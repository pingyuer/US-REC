# TUI local dataset demo (no S3)
#
# This is a template config. Provide the real paths via env vars or edit inline:
#   export TUI_LOCAL_IMG_DIR=/path/to/imgs
#   export TUI_LOCAL_LABEL_PATH=/path/to/Description.json
#   export TUI_LOCAL_SPLIT_FILE=/path/to/split.txt

model:
  name: unet
  num_classes: 2
  bilinear: true

dataset:
  name: data.datasets.TUI.TUI
  img_dir: ${oc.env:TUI_LOCAL_IMG_DIR,/input0/imgs}
  label_path: ${oc.env:TUI_LOCAL_LABEL_PATH,/input0/Description.json}
  split_file: ${oc.env:TUI_LOCAL_SPLIT_FILE,null}

dataloader:
  train:
    batch_size: 8
    num_workers: 4
    shuffle: true
    drop_last: true
    pin_memory: false
  val:
    batch_size: 4
    num_workers: 4
    shuffle: false
    drop_last: false
    pin_memory: false

pipeline:
  train:
    - type: LoadRawBytes
    - type: DecodeImage
    - type: BuildMaskFromSegments
    - type: ApplyAlbumentations
      transforms:
        - type: SmallestMaxSize
          max_size: 256
        - type: PadIfNeeded
          min_height: 256
          min_width: 256
        - type: HorizontalFlip
          p: 0.5
        - type: VerticalFlip
          p: 0.5
        - type: Normalize
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
        - type: ToTensorV2
    - type: FinalizeSegSample
  val:
    - type: LoadRawBytes
    - type: DecodeImage
    - type: BuildMaskFromSegments
    - type: ApplyAlbumentations
      transforms:
        - type: SmallestMaxSize
          max_size: 256
        - type: PadIfNeeded
          min_height: 256
          min_width: 256
        - type: Normalize
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
        - type: ToTensorV2
    - type: FinalizeSegSample

optimizer:
  type: adamw
  lr: 1e-4
  weight_decay: 0.01

lr_scheduler:
  type: PolyLR
  max_epochs: 1
  power: 0.9

loss:
  type: CrossEntropyLoss
  ignore_index: -100

trainer:
  max_epochs: 1
  log_interval: 50
  eval_interval: 1
