[pytest]
# ---------------------------------------------------------------------------
# Test suite for TUS-REC freehand ultrasound reconstruction project
# ---------------------------------------------------------------------------
# Run targets:
#   pytest                          all tests (excl. integration/slow)
#   pytest -m unit                  pure unit tests only (no I/O, no GPU)
#   pytest -m smoke                 fast smoke tests (config + forward + CLI)
#   pytest -m "unit or smoke"       full offline suite
#   pytest -m integration           integration tests (MLflow, real datasets)
#   pytest tests/unit/metrics/      specific domain tests
#   pytest -m "not integration"     everything except infra-dependent tests
# ---------------------------------------------------------------------------
testpaths =
    tests

addopts = -q --tb=short

markers =
    unit:        pure unit tests; no external services, no filesystem I/O beyond tmp_path
    smoke:       fast end-to-end sanity checks; run in < 5 min; config files on disk
    integration: tests requiring external services (MLflow, S3, training loop)
    slow:        long-running tests; opt-in only via -m slow

filterwarnings =
    ignore:Error fetching version info.*:UserWarning
    ignore::DeprecationWarning
